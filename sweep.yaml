# sweep.yaml
# Weights & Biases Sweep Configuration for MLP Hyperparameter Search

project: dl_1
program: src/train.py
method: random # or bayes/grid
metric:
  name: val_accuracy
  goal: maximize
parameters:
  num_layers:
    values: [1, 2, 3, 4, 5, 6]
  l1_size:
    values: [32, 64, 128]
  l2_size:
    values: [32, 64, 128]
  l3_size:
    values: [32, 64, 128]
  l4_size:
    values: [32, 64, 128]
  l5_size:
    values: [32, 64, 128]
  l6_size:
    values: [32, 64, 128]
  activation:
    values: ["sigmoid", "tanh", "relu"]
  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop"]
  batch_size:
    values: [16, 32, 64]
  learning_rate:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.1
  weight_init:
    values: ["random", "xavier"]
  loss:
    values: ["cross_entropy", "mse"]